name: CI

on:
  push:
    branches: [main, DEV]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Verify syntax (CLI + UI)
        run: |
          node --check index.js
          node --check ui.js

      - name: Run CLI tests
        run: node index.js --test

      - name: Run simulation (deterministic)
        run: node index.js --simulate=1,4,2,5,3

      - name: Upload UI artifact
        if: always() && matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: tic-tac-toe-ui
          path: |
            index.html
            styles.css
            ui.js
