name: CI

on:
  push:
    branches: ["main", "DEV"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Syntax check (CLI + UI)
        run: |
          node --check index.js
          node --check ui.js

      - name: Run CLI tests
        run: node index.js --test

      - name: Run simulation (deterministic)
        run: node index.js --simulate=1,4,2,5,3

      - name: Upload UI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tic-tac-toe-ui-node-${{ matrix.node }}
          path: |
            index.html
            styles.css
            ui.js
